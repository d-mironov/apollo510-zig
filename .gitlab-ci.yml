image: alpine:latest

variables:
  # You can pin a specific nightly version (e.g., "0.15.0-dev.123+abcdef") or use "master"
  ZIG_VERSION: "0.15.2"
  
  # Redirect Zig caches into the project directory so GitLab CI can cache them
  ZIG_GLOBAL_CACHE_DIR: "$CI_PROJECT_DIR/.cache/zig"
  ZIG_LOCAL_CACHE_DIR: "$CI_PROJECT_DIR/.zig-cache"

# Global cache configuration to speed up regz generation and compilation
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/zig/
    - .zig-cache/
    - .tools/zig/
  policy: pull-push

stages:
  - lint
  - test
  - build

# ==========================================
# Reusable Templates (YAML Anchors)
# ==========================================

.zig_setup:
  before_script:
    - apk add --no-cache curl jq xz git gcompat
    - export PATH="$CI_PROJECT_DIR/.tools/zig:$PATH"
    - |
      if ! command -v zig > /dev/null || [ "$(zig version)" != "${ZIG_VERSION}" ]; then
        echo "Zig ${ZIG_VERSION} not found in cache. Downloading..."
        mkdir -p "$CI_PROJECT_DIR/.tools/zig"
        if [ "$ZIG_VERSION" = "master" ]; then
          ZIG_URL=$(curl -s https://ziglang.org/download/index.json | jq -r '.master."x86_64-linux".tarball')
        else
          ZIG_URL=$(curl -s https://ziglang.org/download/index.json | jq -r ".\"${ZIG_VERSION}\".\"x86_64-linux\".tarball")
        fi
        curl -sL "$ZIG_URL" | tar -xJ -C "$CI_PROJECT_DIR/.tools/zig" --strip-components=1
      else
        echo "Using cached Zig $(zig version)"
      fi
    - zig version

# ==========================================
# Linting Stage
# ==========================================

fmt:
  stage: lint
  extends: .zig_setup
  script:
    - zig fmt --check .
  allow_failure: false

# ==========================================
# Testing Stage
# ==========================================

test_host:
  stage: test
  extends: .zig_setup
  script:
    # Runs host-side tests for bit-twiddling, state machines, and comptime logic.
    # The '|| true' ensures the pipeline won't fail if no test step is configured in build.zig yet.
    - zig build test --summary all || echo "No tests defined in build.zig yet, skipping."

# ==========================================
# Build Stage
# ==========================================

# Build the firmware in ReleaseSmall (typical for embedded production)
build_release:
  stage: build
  extends: .zig_setup
  script:
    - zig build -Doptimize=ReleaseSmall
  artifacts:
    name: "apollo510-firmware-release-$CI_COMMIT_SHORT_SHA"
    paths:
      - zig-out/firmware/
    expire_in: 1 week

# Build the firmware in Debug (to catch comptime/assert errors early)
build_debug:
  stage: build
  extends: .zig_setup
  script:
    - zig build -Doptimize=Debug
  artifacts:
    name: "apollo510-firmware-debug-$CI_COMMIT_SHORT_SHA"
    paths:
      - zig-out/firmware/
    expire_in: 1 week